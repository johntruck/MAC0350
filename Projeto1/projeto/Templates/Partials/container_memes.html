<!-- Arquivo container_memes.html -->
<div class="memes">
    <div id="mem1">
        <div class="omeme" hx-trigger="click"
            hx-get="/check-acerto?meme_id1={{ id1 }}&&meme_id2={{ id2 }}&escolhido=1&acertos={{ acertos }}"
            hx-target="#container_principal" hx-push-url="false">
            <img src="data:image/jpeg;base64,{{ meme_img1 }}" alt="Meme">
        </div>
        <a href="{{ fonte1 }}">Fonte</a>
    </div>
</div>
<div class="memes">
    <div id="mem2">
        <div class="omeme" hx-trigger="click"
            hx-get="/check-acerto?meme_id1={{ id1 }}&&meme_id2={{ id2 }}&escolhido=2&acertos={{ acertos }}"
            hx-target="#container_principal" hx-push-url="false">
            <img src="data:image/jpeg;base64,{{ meme_img2 }}" alt="Meme">
        </div>
        <a href="{{ fonte2 }}">Fonte</a>

    </div>
</div>

<h1 id="h1_principal" hx-swap-oob="true">
    Qual o meme com mais upvotes?
</h1>
