<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: orange;
            display: flex;
            justify-content: center;
            height: 100vh;
            align-items: center;
            flex-direction: column;
            flex: 1;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        .caixa-de-login {
            background-color: white;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 40px;
            width: 450px;
            text-align: center;
        }

        .conteiner-do-login {
            background-color: white;
            border: 3px solid grey;
            border-radius: 8px;
            padding: 40px;
            width: 50%;
            text-align: center;
        }

        .logo {
            box-sizing: border-box;

        }

        input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #dadce0;
            border-radius: 16px;
            font-size: 16px;
            box-sizing: border-box;
            margin: 2px;
            outline: none;
        }

        input:hover {
            background-color: rgb(207, 206, 206);
        }

        footer {
            background-color: orange;
            padding: 20px;
            text-align: center;
            width: 80%;
            position: fixed;
            bottom: 0;
            height: 7vh;
        }

        img {
            background-color: white;
            max-width: 50%;
            height: auto;
        }
    </style>
</head>

<body>
    <div class="conteiner-do-login">
        <header>
            <div class="logo">
                <img src="usp-logo.png">
            </div>
        </header>
        <div>
            <div class="caixa-do-login">
                <form>
                    <input type="text" placeholder="Usuário" name="usuario">
                    <input type="password" placeholder="Senha" name="senha">
                    <input type="submit" style="padding: 5px 13px;">
                </form>
                <a href="https://uspdigital.usp.br/jupiterweb/esqueciSenha">Esqueci a Senha</a>
            </div>
        </div>
    </div>
    <footer>
        <a href="https://uspdigital.usp.br/jupiterweb/creditos.jsp">Cŕeditos</a>
        <a>|</a>
        <a href="https://uspdigital.usp.br/jupiterweb/jupColegiadoEmailLista">Fale Conosco</a>
        <a>© 1999 - 2025 - Superintendência de Tecnologia da Informação/USP</a>
    </footer>
</body>
<html>
